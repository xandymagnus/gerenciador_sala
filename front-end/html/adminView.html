<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin View</title>
    <link rel="icon" href="../imagens/logo_icon.png">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/adminView.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
</head>
<body>
    <header>
        <div class="logo">
            <img src="../imagens/logo_css_branca.png" alt="logo">
            <h1 class="titulo">TELA DE ADMINISTRADOR</h1>
        </div>
    </header>

    <div class="container_acoes">
        <button id="addButton" type="click">Adicionar aula</button>
        <button id="view">Ver aulas</button>
    </div>

    <div class="overlay" id="overlay">
        <div id="addMenu" class="addMenu">
            <button class="sair" id="sair" type="click">X</button>

            <input type="text" placeholder="Curso" id="curso" class="curso">
            
            <div class="disciplinaProfessor">
                <input type="text" placeholder="Disciplina" id="disciplina" class="disciplina" disabled>
                <input type="text" placeholder="Professor" id="professor" class="professor" disabled>
            </div>

            <input type="text" placeholder="Dia" id="dia" class="dia" disabled>

            <div class="salaHorario">
                <input type="text" placeholder="Sala" id="sala" class="sala" disabled>
                <input type="time" placeholder="Horário" id="horário" class="horário" disabled>
            </div>

            <button id="add" class="add" type="submit">Adicionar</button>
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
