<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin View</title>
    <link rel="icon" href="../imagens/logo_html.png">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/adminview.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../imagens/logo_css.png" alt="logo">
            <h1 class="titulo">AULAS</h1>
        </div>
    </header>
    <div class="dia">
        <select name="Dia" id="dia" class="select_dia">
            <option value="segunda">SEGUNDA</option>
            <option value="terca">TERÇA</option>
            <option value="quarta">QUARTA</option>
            <option value="quinta">QUINTA</option>
            <option value="sexta">SEXTA</option>
        </select>
    </div>    

    <div class="container">
        <div class="infos">
            <h2 class="curso" id="curso">CURSO</h2>
            <h2 class="materia" id="materia">MÁTERIA</h2>
            <h2 class="prof" id="prof">PROFESSOR</h2>
            <h2 class="sala" id="sala">SALA</h2>
            <h2 class="horario" id="horario">HORÁRIO</h2>
        </div>

        <div class="campos">
            <select name="Curso" id="curso" class="curso">
                <option value="ciencia_da_computacao">Ciência da Computação</option>
                <option value="analise_e_desenvolvimento_de_sistema">Análise e Desenvolvimento de Sistemas</option>
                <option value="nutricao">Nutrição</option>
                <option value="medicina">Medicina</option>
                <option value="veterinaria">Veterinária</option>
            </select>

            <select name="Matéria" id="materia" class="materia">
                <option value="desenvolvimento_em_javascript">Desenvolvimento em Javascript</option>
                <option value="anatomia">Anatomia</option>
                <option value="matematica_discreta">Matemática Discreta</option>
            </select>

            <select name="Professor" id="prof" class="prof">
                <option value="marcio">Marcio</option>
                <option value="claudio">Claudio</option>
                <option value="vera">Vera</option>
            </select>

            <select name="Sala" id="sala" class="sala">
                <option value="402d">402 D</option>
                <option value="401d">401 D</option>
                <option value="lab1">Lab 1</option>
            </select>

            <select name="Horário" id="horario" class="horario">
                <option value="08:20-10:20">08:20-10:20</option>
                <option value="08:20-10:20">08:20-11:20</option>
                <option value="08:20-10:20">10:20-12:00</option>
            </select>

            <button type="submit" class="botao" class="poppins-regular">+ ADICIONAR</button>
        </div>
    </div>
</body>
</html>
